<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Manipulator</title>
    
    <style>
        body {
    font-family: system-ui, -apple-system, sans-serif;
    background-color: #1e1e2e;
    color: #cdd6f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background-color: #313244;
    padding: 2rem;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    width: 400px;
    text-align: center;
}

.controls {
    margin-bottom: 1rem;
    display: flex;
    gap: 0.5rem;
}

input {
    flex: 1;
    padding: 0.5rem;
    border: 1px solid #585b70;
    border-radius: 4px;
    background-color: #181825;
    color: #cdd6f4;
}

button {
    padding: 0.5rem 1rem;
    border: none;
    border-radius: 4px;
    background-color: #89b4fa;
    color: #11111b;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background-color: #b4befe;
}

.array-container {
    margin-top: 1rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    padding: 1rem;
    background-color: #181825;
    border-radius: 4px;
    min-height: 50px;
}

.array-element {
    background-color: #a6e3a1;
    color: #11111b;
    padding: 0.5rem;
    border-radius: 4px;
    font-weight: bold;
}

.empty-msg {
    color: #a6adc8;
    font-style: italic;
}
    </style>
</head>
<body>
    <div class="container">
        <h2>Array Manipulator</h2>
        
        <div class="controls">
            <input type="text" id="addInput" placeholder="Enter a value">
            <button onclick="addElement()">Add to Array</button>
        </div>

        <div class="controls">
            <input type="text" id="removeInput" placeholder="Value to remove">
            <button onclick="removeTarget()">Remove Occurrences</button>
        </div>

        <div class="display-area">
            <h3>Memory View:</h3>
            <div id="arrayContainer" class="array-container">
                <span class="empty-msg">Array is empty</span>
            </div>
        </div>
    </div>

    
    
    <script>// Our underlying data structure
let myData = [];

// Function to update the visual representation on the web page
function renderArray() {
    const container = document.getElementById('arrayContainer');
    container.innerHTML = ''; // Clear the current display

    if (myData.length === 0) {
        container.innerHTML = '<span class="empty-msg">Array is empty</span>';
        return;
    }

    // Create a visual box for each element in the array
    myData.forEach((item, index) => {
        const elementDiv = document.createElement('div');
        elementDiv.className = 'array-element';
        elementDiv.innerText = `[${index}]: ${item}`;
        container.appendChild(elementDiv);
    });
}

// Function to push a new value
function addElement() {
    const input = document.getElementById('addInput');
    const value = input.value.trim();
    
    if (value !== '') {
        myData.push(value);
        input.value = ''; // Reset input field
        renderArray();    // Update UI
    }
}

// Function to remove all occurrences of a target value in-place
function removeTarget() {
    const input = document.getElementById('removeInput');
    const target = input.value.trim();

    if (target !== '') {
        let writeIndex = 0;
        
        // Two-pointer logic to modify the array without creating a new one
        for (let readIndex = 0; readIndex < myData.length; readIndex++) {
            if (myData[readIndex] !== target) {
                myData[writeIndex] = myData[readIndex];
                writeIndex++;
            }
        }
        
        // Truncate the array to its new size
        myData.length = writeIndex;

        input.value = '';
        renderArray();
    }
}</script>
</body>
</html>
